name: Verify production deploy

on:
  workflow_dispatch:
  schedule:
    # Daily sanity check that tidingz.com serves the expected dashboard bundle
    - cron: "0 6 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify live production bundle
        run: npm run verify:prod-deploy
        env:
          PRODUCTION_URL: https://tidingz.com
