name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      # Requires DATABASE_URL / DIRECT_URL in GitHub Environment secrets:
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - run: npm run build
      # Add your host deploy step (Vercel CLI, SSH, etc.)
